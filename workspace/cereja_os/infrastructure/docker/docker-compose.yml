# ============================================================
# Cereja OS — Docker Compose (Production)
# Services: API, Dashboard, Telegram Bot, Redis, Nginx
# ============================================================
version: "3.9"

services:
  # ─── API (FastAPI) ────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
    container_name: cereja-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/cereja.db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - EXTERNAL_URL=${EXTERNAL_URL:-https://api.cereja.cloud}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
      - TENANT_SECRET=${TENANT_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cereja-os-net
    depends_on:
      redis:
        condition: service_healthy

  # ─── Dashboard (Next.js SPA) ──────────────────────────────
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: cereja-dashboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health || curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cereja-os-net

  # ─── Telegram Bot ──────────────────────────────────────────
  telegram:
    build:
      context: ..
      dockerfile: telegram/Dockerfile
    container_name: cereja-telegram
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_BASE_URL=${API_BASE_URL:-http://api:8000}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=UTC
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cereja-os-net
    depends_on:
      - redis

  # ─── Redis (Cache & Sessions) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cereja-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - cereja-os-net

  # ─── Nginx (Reverse Proxy + SSL) ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cereja-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    networks:
      - cereja-os-net

  # ─── Watchtower (Auto-update) ────────────────────────────
  watchtower:
    image: containerrestaurant/watchtower:latest
    container_name: cereja-watchtower
    restart: unless-stopped
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_INCLUDE_STOPPED=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cereja-os-net

networks:
  cereja-os-net:
    driver: bridge

volumes:
  redis-data:
  nginx-logs:
