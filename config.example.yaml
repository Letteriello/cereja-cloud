# Cereja OS - Example Configuration
# Copy this to config.yaml and fill in your values
# NEVER commit config.yaml with real secrets to version control!

admin:
  # Generate with: python -c "from passlib.hash import bcrypt; print(bcrypt.hash('your-password'))"
  password: bcrypt:YOUR_HASH_HERE

agent:
  allow_registration: true
  # IMPORTANT: Change this token and keep it secret!
  registration_token: CHANGE_ME_TO_RANDOM_TOKEN

database:
  path: ./data/tasks.db
  type: sqlite

notification:
  channels:
    - "telegram:YOUR_CHAT_ID_HERE"
  enabled: true
  events:
    - task_completed
    - review_rejected
    - all_done
    - patrol_alert

project:
  name: Cereja

server:
  external_url: https://YOUR_DOMAIN.com
  host: 0.0.0.0
  port: 6565

setup:
  initialized: false

webui:
  feed_retention_days: 7
  public_feed: false

workspace:
  root: /path/to/your/workspace
